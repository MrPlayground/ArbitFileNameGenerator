<!DOCTYPE html>
<html>
<script src="http://ajax.googleapis.com/ajax/libs/jquery/1.3.1/jquery.min.js" 

type="text/javascript"></script> 
<script language="JavaScript"> 
var numraindrops="150";
var speed="5";
var rainsize="2";
var wind="left";
var genxgallery="";

function tb5_makeArray(n){ this.length = n; return this.length;
}
tb5_messages = new tb5_makeArray(2);
tb5_messages[0] = "Created by";
tb5_messages[1] = "♠[•]MrPlayground[•]♠";
tb5_rptType = 'infinite';
tb5_rptNbr = 10;
tb5_speed = 50;
tb5_delay = 2000;
var tb5_counter=1;
var tb5_currMsg=0;
var tb5_stsmsg="";
function tb5_shuffle(arr){
var k;
for (i=0; i<arr.length; i++){ k = Math.round(Math.random() * (arr.length - i - 

1)) + i; temp = arr[i];arr[i]=arr[k];arr[k]=temp;
}
return arr;
}
tb5_arr = new tb5_makeArray(tb5_messages[tb5_currMsg].length);
tb5_sts = new tb5_makeArray(tb5_messages[tb5_currMsg].length);
for (var i=0; i<tb5_messages[tb5_currMsg].length; i++){ tb5_arr[i] = i; 

tb5_sts[i] = "*#";
}
tb5_arr = tb5_shuffle(tb5_arr);
function tb5_init(n){
var k;
if (n == tb5_arr.length){ if (tb5_currMsg == tb5_messages.length-1){ if 

((tb5_rptType == 'finite') && (tb5_counter==tb5_rptNbr)){ clearTimeout

(tb5_timerID); return; } tb5_counter++; tb5_currMsg=0; } else{ tb5_currMsg++; 

} n=0; tb5_arr = new tb5_makeArray(tb5_messages[tb5_currMsg].length); tb5_sts 

= new tb5_makeArray(tb5_messages[tb5_currMsg].length); for (var i=0; 

i<tb5_messages[tb5_currMsg].length; i++){ tb5_arr[i] = i; tb5_sts[i] = "+="; } 

tb5_arr = tb5_shuffle(tb5_arr); tb5_sp=tb5_delay;
}
else{ tb5_sp=tb5_speed; k = tb5_arr[n]; tb5_sts[k] = tb5_messages

[tb5_currMsg].charAt(k); tb5_stsmsg = ""; for (var i=0; i<tb5_sts.length; i++) 

tb5_stsmsg += tb5_sts[i]; document.title = tb5_stsmsg; n++; } tb5_timerID = 

setTimeout("tb5_init("+n+")", tb5_sp);
}
function tb5_randomizetitle(){ tb5_init(0);
}
tb5_randomizetitle();
</script>
<head>
<title>Document Name Generator</title>

<style>
body{
    font-family: Arial;
    background:#f4f6f8;

    display:flex;
    justify-content:center;
    align-items:center;

    height:90vh;
    margin:0;
}

.container{
    background:white;
    padding:25px;
    border-radius:10px;
    width:500px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
h2{
	text-align:center; 
	margin-bottom:20px;
}
input{
    width:95%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border-radius:5px;
    border:1px solid #ccc;
}

.row{
    display:flex;
    align-items:center;
    margin-bottom:10px;
}

.generated{
    background:#eef2f7;
    padding:8px;
    border-radius:5px;
    flex:1;
    margin-right:10px;
}

button{
    background:#2d89ef;
    color:white;
    border:none;
    padding:8px 15px;
    border-radius:5px;
    cursor:pointer;
    margin-right:5px;
}

button:hover{
    background:#1b5fbf;
}

.clearBtn{
    background:#e74c3c;
}

.clearBtn:hover{
    background:#c0392b;
}

.label{
    width:70px;
    font-weight:bold;
}

.controls{
    margin-bottom:15px;
}
footer{
	background-color:##808080;
	color: black;
	padding: 3px;
	text-align: center;
	position: fixed;
	bottom: 0;
	width: 100%;
	
}
</style>

</head>

<body>

<div class="container">

<h2>Document Text Generator</h2>

<label>Dispute Number</label>
<input id="dispute" type="text" oninput="generate()">

<label>EHR Number</label>
<input id="ehr" type="text" oninput="generate()">

<div class="controls">
<button onclick="clearFields()" class="clearBtn">Clear</button>
</div>

<hr>

<div class="row">
<div class="label">HCFA</div>
<div id="hcfa" class="generated"></div>
<button onclick="copyText('hcfa')">Copy</button>
</div>

<div class="row">
<div class="label">EOB</div>
<div id="eob" class="generated"></div>
<button onclick="copyText('eob')">Copy</button>
</div>

<div class="row">
<div class="label">HMO</div>
<div id="hmo" class="generated"></div>
<button onclick="copyText('hmo')">Copy</button>
</div>

<div class="row">
<div class="label">OP</div>
<div id="op" class="generated"></div>
<button onclick="copyText('op')">Copy</button>
</div>

<div class="row">
<div class="label">OP2</div>
<div id="op2" class="generated"></div>
<button onclick="copyText('op2')">Copy</button>
</div>

<div class="row">
<div class="label">OP3</div>
<div id="op3" class="generated"></div>
<button onclick="copyText('op3')">Copy</button>
</div>

</div>

<script>

function generate(){

let dispute =
document.getElementById("dispute").value;

let ehr =
document.getElementById("ehr").value;

if(dispute && ehr){

document.getElementById("hcfa").innerText =
dispute+"_"+ehr+"_hcfa";

document.getElementById("eob").innerText =
dispute+"_"+ehr+"_physicaleob";

document.getElementById("hmo").innerText =
dispute+"_"+ehr+"_insurancecard";

document.getElementById("op").innerText =
dispute+"_"+ehr+"_opreport";

document.getElementById("op2").innerText =
dispute+"_"+ehr+"_opreport2";

document.getElementById("op3").innerText =
dispute+"_"+ehr+"_opreport3";

}

}

function copyText(id){

let text =
document.getElementById(id).innerText;

navigator.clipboard.writeText(text);

//alert("Copied: "+text);

}

function clearFields(){

document.getElementById("dispute").value="";
document.getElementById("ehr").value="";

document.getElementById("hcfa").innerText="";
document.getElementById("eob").innerText="";
document.getElementById("hmo").innerText="";
document.getElementById("op").innerText="";
document.getElementById("op2").innerText="";
document.getElementById("op3").innerText="";

}

</script>
<footer>
	<p>Any Questions or Problems?</p>
	<p><a href="mailto:angelo.palaroan015@gmail.com">Contact Me</a></p>
</footer>
</body>
</html>
