<!DOCTYPE html>
<html>
<head>
<title>Document Name Generator</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="theme-selector">
  <select id="themeSelector" onchange="switchTheme(this.value)">
    <option value="light">Light Mode</option>
    <option value="dark">Dark Mode</option>
    <option value="bw">Black & White</option>
    <option value="vscode">Avengers Endgame</option>
    <option value="sleek">Sleek</option>
  </select>
</div>

<div class="main-container">

<!-- SECTION 1: File Name Generator -->
<div class="container">

<h2>File Name Generator</h2>

<label>ARBIT Numbers (one per line)</label>
<textarea id="arbitInputArea" rows="5"></textarea>

<label>EHR Numbers (one per line)</label>
<textarea id="ehrInputArea" rows="5"></textarea>

<button onclick="loadArbitEHRMappings()">Load Data</button>

<div id="mappingFeedback"></div>

<div id="currentSelection" style="margin-bottom:8px; font-size:12px; font-weight:bold; color: var(--text-primary);">No data loaded</div>

<div class="controls">
<button onclick="previousMapping()" id="prevBtn" disabled>Previous</button>
<button onclick="nextMapping()" id="nextBtn" disabled>Next</button>
<button onclick="clearFields()" class="clearBtn">Clear All</button>
</div>

<hr style="margin:8px 0;">

<div class="row">
<div class="label">HCFA</div>
<div id="hcfa" class="generated"></div>
<button onclick="copyText('hcfa')">Copy</button>
</div>

<div class="row">
<div class="label">EOB</div>
<div id="eob" class="generated"></div>
<button onclick="copyText('eob')">Copy</button>
</div>

<div class="row">
<div class="label">HMO</div>
<div id="hmo" class="generated"></div>
<button onclick="copyText('hmo')">Copy</button>
</div>

<div class="row">
<div class="label">OP</div>
<div id="op" class="generated"></div>
<button onclick="copyText('op')">Copy</button>
</div>

<div class="row">
<div class="label">OP2</div>
<div id="op2" class="generated"></div>
<button onclick="copyText('op2')">Copy</button>
</div>

<div class="row">
<div class="label">OP3</div>
<div id="op3" class="generated"></div>
<button onclick="copyText('op3')">Copy</button>
</div>

</div>

<!-- SECTION 2: Arbit Case Notes -->
<div class="container">

<h2>Arbit Case Notes</h2>

<div class="case-notes-section">
  <div class="note-field">
    <label>
      <input type="checkbox" id="frDateCheckbox" onchange="generateCaseNotes()"> FR Date
    </label>
    <div class="claim-inputs">
      <input type="text" id="frDateSystem" placeholder="System date" oninput="autoFormatDate(this); generateCaseNotes()">
      <input type="text" id="frDateCorrect" placeholder="Correct date" oninput="autoFormatDate(this); generateCaseNotes()">
    </div>
  </div>

  <div class="note-field">
    <label>
      <input type="checkbox" id="lastEobCheckbox" onchange="generateCaseNotes()"> Last EOB
    </label>
    <div class="claim-inputs">
      <input type="text" id="lastEobSystem" placeholder="System date" oninput="autoFormatDate(this); generateCaseNotes()">
      <input type="text" id="lastEobCorrect" placeholder="Correct date" oninput="autoFormatDate(this); generateCaseNotes()">
    </div>
  </div>

  <div class="note-field">
    <label>
      <input type="checkbox" id="claimCheckbox" onchange="generateCaseNotes()"> Claim Number
    </label>
    <div class="claim-inputs">
      <input type="text" id="claimSystem" placeholder="System data" oninput="generateCaseNotes()">
      <input type="text" id="claimUser" placeholder="Correct data" oninput="generateCaseNotes()">
    </div>
  </div>
</div>

<div class="row">
  <div class="label">Output</div>
  <div id="caseOutput" class="generated"></div>
  <button onclick="copyText('caseOutput')">Copy</button>
</div>

</div>

<!-- SECTION 3: Missing Notes (MPOWER and AUDX | USMON Portal) -->
<div class="container">

<h2>Missing Notes</h2>
<label style="font-size:11px;color:#666;">(MPOWER and AUDX | USMON Portal)</label>

<div class="case-notes-section">
  <div class="note-field">
    <label><input type="checkbox" id="mrNoteCheckbox" onchange="generateMissingNotes()"> MR Note</label>
  </div>
  <div class="note-field">
    <label><input type="checkbox" id="hcfaNoteCheckbox" onchange="generateMissingNotes()"> HCFA Note</label>
  </div>
  <div class="note-field">
    <label><input type="checkbox" id="eobNoteCheckbox" onchange="generateMissingNotes()"> EOB Note</label>
  </div>
</div>

<div class="row">
  <div class="label">Output</div>
  <div id="missingOutput" class="generated"></div>
  <button onclick="copyText('missingOutput')">Copy</button>
</div>

<div class="case-notes-section" style="margin-top:12px;">
  <div class="note-field">
    <label><input type="checkbox" id="insCardCheckbox" onchange="generateMissingNotes()"> INS Card</label>
  </div>
</div>

<div class="row">
  <div class="label">Output</div>
  <div id="insCardOutput" class="generated"></div>
  <button onclick="copyText('insCardOutput')">Copy</button>
</div>

<div class="case-notes-section" style="margin-top:12px;">
  <div class="note-field">
    <label><input type="checkbox" id="checkEobCheckbox" onchange="generateMissingNotes()"> Check/Production Date EOB</label>
  </div>
</div>

<div class="row">
  <div class="label">Output</div>
  <div id="checkEobOutput" class="generated"></div>
  <button onclick="copyText('checkEobOutput')">Copy</button>
</div>

</div>

</div>

<footer>
	<p>Any Problems, Questions or Suggestions?</p>
	<p><a href="mailto:angelo.palaroan015@gmail.com">Email Me</a></p>
</footer>

<script src="http://ajax.googleapis.com/ajax/libs/jquery/1.3.1/jquery.min.js" type="text/javascript"></script> 
<script language="JavaScript"> 
var numraindrops="150";
var speed="5";
var rainsize="2";
var wind="left";
var genxgallery="";

function tb5_makeArray(n){ this.length = n; return this.length;
}
tb5_messages = new tb5_makeArray(2);
tb5_messages[0] = "Created by";
tb5_messages[1] = "♠[•]MrPlayground[•]♠";
tb5_rptType = 'infinite';
tb5_rptNbr = 10;
tb5_speed = 50;
tb5_delay = 2000;
var tb5_counter=1;
var tb5_currMsg=0;
var tb5_stsmsg="";
function tb5_shuffle(arr){
var k;
for (i=0; i<arr.length; i++){ k = Math.round(Math.random() * (arr.length - i - 1)) + i; temp = arr[i];arr[i]=arr[k];arr[k]=temp;
}
return arr;
}
tb5_arr = new tb5_makeArray(tb5_messages[tb5_currMsg].length);
tb5_sts = new tb5_makeArray(tb5_messages[tb5_currMsg].length);
for (var i=0; i<tb5_messages[tb5_currMsg].length; i++){ tb5_arr[i] = i; tb5_sts[i] = "*#";
}
tb5_arr = tb5_shuffle(tb5_arr);
function tb5_init(n){
var k;
if (n == tb5_arr.length){ if (tb5_currMsg == tb5_messages.length-1){ if ((tb5_rptType == 'finite') && (tb5_counter==tb5_rptNbr)){ clearTimeout(tb5_timerID); return; } tb5_counter++; tb5_currMsg=0; } else{ tb5_currMsg++; } n=0; tb5_arr = new tb5_makeArray(tb5_messages[tb5_currMsg].length); tb5_sts = new tb5_makeArray(tb5_messages[tb5_currMsg].length); for (var i=0; i<tb5_messages[tb5_currMsg].length; i++){ tb5_arr[i] = i; tb5_sts[i] = "+="; } tb5_arr = tb5_shuffle(tb5_arr); tb5_sp=tb5_delay;
}
else{ tb5_sp=tb5_speed; k = tb5_arr[n]; tb5_sts[k] = tb5_messages[tb5_currMsg].charAt(k); tb5_stsmsg = ""; for (var i=0; i<tb5_sts.length; i++) tb5_stsmsg += tb5_sts[i]; document.title = tb5_stsmsg; n++; } tb5_timerID = setTimeout("tb5_init("+n+")", tb5_sp);
}
function tb5_randomizetitle(){ tb5_init(0);
}
tb5_randomizetitle();
</script>

<script src="script.js"></script>
</body>
</html>
